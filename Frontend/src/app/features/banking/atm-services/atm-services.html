<!-- ATM SERVICES -->
<div class="page-panel" id="panel-atm">
    <div style="font-size:13px; color:var(--text-secondary); margin-bottom:16px;">Bank service operations — POST
        /bank-service endpoints</div>
    <div class="atm-grid">
        <div class="service-card">
            <div class="service-card-header">
                <div class="service-icon icon-deposit"><i class="ti ti-arrow-down" aria-hidden="true"></i></div>
                <div>
                    <div class="service-card-title">Deposit Amount</div>
                    <div class="service-card-sub">POST /bank-service/deposit</div>
                </div>
            </div>
            <div class="form-row-full">
                <label class="form-label">Account ID</label>
                <input class="form-input-sm" type="number" placeholder="e.g. 1042" />
            </div>
            <div class="form-row-full">
                <label class="form-label">Amount (₹)</label>
                <input class="form-input-sm" type="number" placeholder="e.g. 25000" />
            </div>
            <button class="btn-service btn-deposit" onclick="showToast('₹25,000 deposited to Acc #1042', 'success')">
                <i class="ti ti-arrow-down" aria-hidden="true"></i> Deposit Funds
            </button>
        </div>

        <div class="service-card">
            <div class="service-card-header">
                <div class="service-icon icon-withdraw"><i class="ti ti-arrow-up" aria-hidden="true"></i></div>
                <div>
                    <div class="service-card-title">Withdraw Amount</div>
                    <div class="service-card-sub">POST /bank-service/withdraw</div>
                </div>
            </div>
            <div class="form-row-full">
                <label class="form-label">Account ID</label>
                <input class="form-input-sm" type="number" placeholder="e.g. 2091" />
            </div>
            <div class="form-row-full">
                <label class="form-label">Amount (₹)</label>
                <input class="form-input-sm" type="number" placeholder="e.g. 8500" />
            </div>
            <button class="btn-service btn-withdraw" onclick="showToast('₹8,500 withdrawn from Acc #2091', 'success')">
                <i class="ti ti-arrow-up" aria-hidden="true"></i> Withdraw Funds
            </button>
        </div>

        <div class="service-card" style="grid-column: span 2;">
            <div class="service-card-header">
                <div class="service-icon icon-transfer"><i class="ti ti-arrows-exchange" aria-hidden="true"></i></div>
                <div>
                    <div class="service-card-title">Transfer Money</div>
                    <div class="service-card-sub">POST /bank-service/transfer</div>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr auto 1fr 160px; gap:12px; align-items:flex-end;">
                <div>
                    <label class="form-label">From Account ID</label>
                    <input class="form-input-sm" type="number" placeholder="e.g. 1042" />
                </div>
                <div style="display:flex; align-items:center; padding-bottom:4px; color:var(--text-muted);">
                    <i class="ti ti-arrow-right" style="font-size:20px;" aria-hidden="true"></i>
                </div>
                <div>
                    <label class="form-label">To Account ID</label>
                    <input class="form-input-sm" type="number" placeholder="e.g. 3017" />
                </div>
                <div>
                    <label class="form-label">Amount (₹)</label>
                    <input class="form-input-sm" type="number" placeholder="e.g. 50000" />
                </div>
            </div>
            <button class="btn-service btn-transfer" style="margin-top:12px;"
                onclick="showToast('Transfer initiated successfully', 'success')">
                <i class="ti ti-arrows-exchange" aria-hidden="true"></i> Transfer Funds
            </button>
        </div>
    </div>
</div>
